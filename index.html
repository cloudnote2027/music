<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S 0 S MODS - RGB Visualizer Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Kavoon&family=Noto+Sans+Myanmar:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
    <style>
        :root { 
            --bg: #050505; 
            --card: rgba(15, 15, 15, 0.95); 
            --font-main: 'Kavoon', serif;
            --font-mm: 'Noto Sans Myanmar', sans-serif;
        }
        
        @keyframes rgb-text {
            0% { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
            33% { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
            66% { color: #0000ff; text-shadow: 0 0 10px #0000ff; }
            100% { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: var(--font-mm);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding: 15px; 
            background-image: radial-gradient(circle at center, #151515 0%, #000 100%);
            overflow-x: hidden;
        }

        .player-main-container {
            display: flex; 
            flex-direction: column; 
            align-items: center;
            width: 100%; 
            max-width: 330px; 
            height: calc(100vh - 30px);
            position: relative;        }

        .dev-tag {
            font-family: var(--font-main);
            font-size: 0.8rem; 
            letter-spacing: 2px; 
            margin-bottom: 10px;
            text-transform: uppercase;
            animation: rgb-text 3s linear infinite;
        }

        .player-card { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 25px; 
            width: 100%; 
            text-align: center; 
            position: relative;
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.9); 
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .lyrics-box { 
            height: 50px; 
            font-size: 0.9rem; 
            margin-bottom: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: rgba(0,0,0,0.5); 
            border-radius: 12px; 
            padding: 8px;
            animation: rgb-text 4s linear infinite;
            font-weight: bold;
        }

        .song-info h2 { 
            font-family: var(--font-main); 
            margin: 0; 
            font-size: 1.6rem; 
            animation: rgb-text 5s linear infinite;
        }

        .song-info p { 
            margin: 5px 0 25px 0; 
            font-size: 0.85rem; 
            letter-spacing: 1px;             font-weight: bold;
            animation: rgb-text 6s linear infinite;
        }

        /* VISUALIZER CANVAS */
        #visualizer-canvas {
            width: 100%;
            height: 60px;
            margin-bottom: 15px;
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
        }

        .progress-bar { 
            width: 100%; 
            height: 5px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 10px; 
            margin-bottom: 25px; 
            cursor: pointer; 
        }
        
        #progress { 
            width: 0%; 
            height: 100%; 
            background: linear-gradient(90deg, #f00, #0f0, #00f, #f0f);
            background-size: 300% 100%;
            animation: rgb-flow 2s linear infinite;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.5); 
            border-radius: 10px;
        }

        @keyframes rgb-flow { 
            0% { background-position: 0% 50%; } 
            100% { background-position: 100% 50%; } 
        }

        .controls { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            align-items: center; 
        }
        
        .btn { 
            background: transparent; 
            border: 2px solid transparent;
            background-image: linear-gradient(var(--card), var(--card)), linear-gradient(45deg, #f00, #0f0, #00f);
            background-origin: border-box; 
            background-clip: content-box, border-box;            color: #fff; 
            border-radius: 50%; 
            width: 50px; 
            height: 50px; 
            cursor: pointer; 
            transition: 0.3s;
            font-size: 1rem;
        }

        .play-btn { 
            width: 70px; 
            height: 70px; 
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .song-list-wrapper {
            width: 100%; 
            background: rgba(10, 10, 10, 0.7); 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            flex-grow: 1;
        }
        
        .song-list-header {
            font-family: var(--font-main); 
            font-size: 0.75rem;
            padding: 12px 15px; 
            border-bottom: 1px solid rgba(255,255,255,0.02);
            animation: rgb-text 8s linear infinite;
        }

        .song-list { 
            overflow-y: auto; 
            padding: 10px; 
        }
        
        .song-item { 
            padding: 12px; 
            cursor: pointer; 
            border-radius: 15px; 
            transition: 0.2s; 
            margin-bottom: 6px; 
            border: 1px solid transparent;
        }
        
        .song-item.active { 
            background: rgba(255, 255, 255, 0.03);            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .song-item.active .song-item-title { 
            animation: rgb-text 3s linear infinite; 
            font-weight: bold;
        }
        
        .song-item-title { 
            font-size: 0.9rem; 
            color: #888; 
        }

        .loading-text {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.9rem;
        }

        /* ========== MENU STYLES - LEFT SIDE ========== */
        
        .menu-toggle {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            background-image: linear-gradient(rgba(15,15,15,0.95), rgba(15,15,15,0.95)), 
                              linear-gradient(45deg, #f00, #0f0, #00f);
            background-origin: border-box;
            background-clip: content-box, border-box;
            color: #fff;
            border-radius: 12px;
            width: 45px;
            height: 45px;
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .menu-toggle:hover { 
            transform: scale(1.1); 
            box-shadow: 0 0 20px rgba(0,255,255,0.6); 
        }
        .menu-panel {
            position: fixed;
            top: 0;
            left: -350px;
            width: 320px;
            height: 100vh;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(20px);
            border-left: none;
            border-right: 2px solid rgba(0, 255, 255, 0.3);
            padding: 25px;
            z-index: 1000;
            transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 40px rgba(0,0,0,0.9);
            overflow-y: auto;
        }
        
        .menu-panel.active { 
            left: 0;
        }

        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        
        .menu-title {
            font-family: var(--font-main);
            font-size: 1.2rem;
            animation: rgb-text 4s linear infinite;
            letter-spacing: 2px;
        }
        
        .menu-close {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;            border-radius: 10px;
            transition: all 0.3s ease;
        }
        
        .menu-close:hover { 
            background: rgba(255,0,0,0.3); 
            transform: rotate(90deg); 
        }

        .menu-items {
            flex: 1;
            overflow-y: auto;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .menu-item:hover {
            background: rgba(0,255,255,0.1);
            border-color: rgba(0,255,255,0.4);
            transform: translateX(8px);
            box-shadow: 0 5px 15px rgba(0,255,255,0.2);
        }
        
        .menu-item-icon { 
            margin-right: 12px; 
            font-size: 1.3rem; 
        }
        
        .menu-item-label {
            flex: 1;
        }
        
        .menu-item select {
            background: rgba(0,0,0,0.5);
            color: #0ff;
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 0.85rem;            cursor: pointer;
            outline: none;
        }

        .menu-footer {
            padding-top: 20px;
            border-top: 2px solid rgba(255,255,255,0.1);
            text-align: center;
            color: #666;
            font-size: 0.75rem;
            margin-top: 20px;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .menu-overlay.active { 
            opacity: 1; 
            visibility: visible; 
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(45deg, #0ff, #0f0, #00f);
            color: #000;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            z-index: 3000;
            box-shadow: 0 5px 25px rgba(0,255,255,0.5);
            transition: transform 0.3s ease;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        @media (max-width: 360px) {
            .menu-panel { 
                width: 280px; 
                left: -280px; 
            }
            .player-main-container { 
                max-width: 100%; 
            }
        }
    </style>
</head>
<body>

<div class="player-main-container">
    <div class="dev-tag">Developer: ကိုမျိုး</div>
    
    <div class="player-card">
        <button class="menu-toggle" onclick="toggleMenu()" title="Menu">☰</button>
        
        <div class="lyrics-box" id="lyrics-text">S 0 S MODS RGB</div>
        
        <div class="song-info">
            <h2 id="title">Loading...</h2>
            <p id="artist">Please wait</p>
        </div>

        <!-- Audio Visualizer Canvas -->
        <canvas id="visualizer-canvas"></canvas>

        <div class="progress-bar" id="p-box" onclick="seek(event)">
            <div id="progress"></div>
        </div>

        <div class="controls">
            <button class="btn" onclick="prev()">⏮</button>
            <button class="btn play-btn" onclick="toggle()" id="playB">PLAY</button>
            <button class="btn" onclick="next()">⏭</button>
        </div>
    </div>

    <div class="song-list-wrapper">
        <div class="song-list-header">TRACKLIST</div>
        <div class="song-list" id="list-container">
            <div class="loading-text">Loading songs...</div>
        </div>
    </div>
</div>

<!-- Menu Panel --><div class="menu-panel" id="menuPanel">
    <div class="menu-header">
        <span class="menu-title">⚙️ SETTINGS</span>
        <button class="menu-close" onclick="toggleMenu()">✕</button>
    </div>
    <div class="menu-items">
        <div class="menu-item" onclick="toggleTheme()">
            <span class="menu-item-icon">🎨</span>
            <span class="menu-item-label">Theme Toggle</span>
        </div>
        <div class="menu-item" onclick="showAbout()">
            <span class="menu-item-icon">ℹ️</span>
            <span class="menu-item-label">About Developer</span>
        </div>
        <div class="menu-item" onclick="clearCache()">
            <span class="menu-item-icon">🗑️</span>
            <span class="menu-item-label">Clear Cache</span>
        </div>
        <div class="menu-item" onclick="toggleVisualizer()">
            <span class="menu-item-icon">🌊</span>
            <span class="menu-item-label">Audio Visualizer</span>
            <span id="vizStatus" style="color:#0ff;margin-left:auto;">ON</span>
        </div>
        <div class="menu-item">
            <span class="menu-item-icon">⚡</span>
            <span class="menu-item-label">Playback Speed</span>
            <select id="speedSelect" onchange="changeSpeed(this.value)">
                <option value="0.5">0.5x</option>
                <option value="1" selected>1x</option>
                <option value="1.5">1.5x</option>
                <option value="2">2x</option>
            </select>
        </div>
    </div>
    <div class="menu-footer">
        <small>S 0 S MODS v1.1<br>Developer: ကိုမျိုး</small>
    </div>
</div>

<!-- Menu Overlay -->
<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
    const { Client, Databases } = Appwrite;
    const client = new Client().setEndpoint('https://sgp.cloud.appwrite.io/v1').setProject('69d4b1300032c235932d');
    const databases = new Databases(client);
    const audio = document.getElementById('audio');
        let songs = [];
    let currentIdx = 0;
    let visualizerEnabled = true; // Default ON
    
    // Audio Context for Visualizer
    let audioContext;
    let analyser;
    let source;
    let canvas, ctx;
    let bufferLength;
    let dataArray;
    let isAudioContextInitialized = false;

    // Demo Songs (Fallback if Appwrite fails)
    const demoSongs = [
        {
            title: "ဘယ်ဘာ့လဲ",
            artist: "ထွန်းအောင်",
            src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
            lyrics: { 0: "ဘယ်ဘာ့လဲ 🎵", 10: "သီချင်းစတင်ပါပြီ", 20: "နားထောင်ပါ..." }
        },
        {
            title: "တစ်ခါသားရင်ခုန်လို့ပါ",
            artist: "အဆိုတော်",
            src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
            lyrics: { 0: "တစ်ခါသားရင်ခုန်လို့ပါ 🎶" }
        },
        {
            title: "သကြင်္သမေရွင်း",
            artist: "အဆိုတော်",
            src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
            lyrics: { 0: "သကြင်္သမေရွင်း 🎤" }
        }
    ];

    async function initPlayer() {
        try {
            document.getElementById('title').innerText = "SYNCING...";
            document.getElementById('artist').innerText = "Connecting to server";
            
            const response = await databases.listDocuments('69d4b25f0004ed8a26a2', 'cloud');
            
            if (response.documents && response.documents.length > 0) {
                songs = response.documents.map(doc => {
                    let pL = {};
                    try { 
                        pL = JSON.parse(doc.lyrics.replace(/'/g, '"')); 
                    } catch(e) { 
                        pL = { 0: doc.lyrics || "..." }; 
                    }                    return { 
                        title: doc.title, 
                        artist: doc.artist, 
                        src: doc.src, 
                        lyrics: pL 
                    };
                });
                showToast('✅ Loaded ' + songs.length + ' songs from server');
            } else {
                throw new Error("No songs found");
            }
        } catch (error) { 
            console.error("Appwrite Error:", error);
            showToast('⚠️ Using Demo Songs');
            
            // Use demo songs as fallback
            songs = demoSongs;
        }
        
        renderList();
        if (songs.length > 0) {
            loadSong(0);
        } else {
            document.getElementById('title').innerText = "NO SONGS";
            document.getElementById('artist').innerText = "Please add songs";
            document.getElementById('list-container').innerHTML = '<div class="loading-text">No songs available</div>';
        }
        
        // Initialize Visualizer Canvas
        initVisualizer();
    }

    function initVisualizer() {
        canvas = document.getElementById('visualizer-canvas');
        ctx = canvas.getContext('2d');
        
        // Set canvas size
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        
        bufferLength = 128; // Number of bars
        dataArray = new Uint8Array(bufferLength);
        
        // Draw initial empty state
        drawVisualizer();
    }

    function initAudioContext() {
        if (isAudioContextInitialized) return;
                try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            source = audioContext.createMediaElementSource(audio);
            
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            
            analyser.fftSize = 256;
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            
            isAudioContextInitialized = true;
            console.log("Audio Context Initialized");
        } catch (e) {
            console.error("Audio Context Error:", e);
        }
    }

    function drawVisualizer() {
        if (!visualizerEnabled || !ctx || !canvas) return;
        
        requestAnimationFrame(drawVisualizer);
        
        if (!analyser) {
            // Fallback animation if no audio context
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const barWidth = (canvas.width / bufferLength) * 2.5;
            let x = 0;
            
            for(let i = 0; i < bufferLength; i++) {
                const barHeight = Math.random() * canvas.height * 0.5;
                
                // RGB Gradient
                const gradient = ctx.createLinearGradient(0, canvas.height, 0, canvas.height - barHeight);
                gradient.addColorStop(0, '#ff0000');
                gradient.addColorStop(0.5, '#00ff00');
                gradient.addColorStop(1, '#0000ff');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                
                x += barWidth + 1;
            }
            return;
        }
        
        analyser.getByteFrequencyData(dataArray);        
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        const barWidth = (canvas.width / bufferLength) * 2.5;
        let x = 0;
        
        for(let i = 0; i < bufferLength; i++) {
            const barHeight = (dataArray[i] / 255) * canvas.height;
            
            // RGB Gradient based on frequency
            const hue = (i / bufferLength) * 360;
            ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
            
            // Add glow effect
            ctx.shadowBlur = 10;
            ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
            
            ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
            
            // Reset shadow for next frame
            ctx.shadowBlur = 0;
            
            x += barWidth + 1;
        }
    }

    function renderList() {
        const container = document.getElementById('list-container');
        if (songs.length === 0) {
            container.innerHTML = '<div class="loading-text">No songs found</div>';
            return;
        }
        
        container.innerHTML = songs.map((s, i) => `
            <div class="song-item ${i === currentIdx ? 'active' : ''}" onclick="selectSong(${i})">
                <span class="song-item-title">${i + 1}. ${s.title}</span>
            </div>
        `).join('');
    }

    function loadSong(index) {
        if (index < 0 || index >= songs.length) return;
        
        currentIdx = index;
        audio.src = songs[currentIdx].src;
        document.getElementById('title').innerText = songs[currentIdx].title;
        document.getElementById('artist').innerText = songs[currentIdx].artist;
        document.getElementById('lyrics-text').innerText = "Ready to play";
        renderList();        
        // Initialize Audio Context on first load
        if (!isAudioContextInitialized) {
            initAudioContext();
        }
    }

    function selectSong(i) { 
        loadSong(i); 
        audio.play(); 
        document.getElementById('playB').innerText = "PAUSE"; 
        
        // Ensure Audio Context is running
        if (audioContext && audioContext.state === 'suspended') {
            audioContext.resume();
        }
    }
    
    function toggle() {
        if (audio.paused) { 
            if (!audio.src) {
                showToast('⚠️ No song loaded');
                return;
            }
            
            // Initialize Audio Context if needed
            if (!isAudioContextInitialized) {
                initAudioContext();
            }
            
            // Resume Audio Context if suspended
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
            
            audio.play(); 
            document.getElementById('playB').innerText = "PAUSE"; 
        } else { 
            audio.pause(); 
            document.getElementById('playB').innerText = "PLAY"; 
        }
    }
    
    function next() { 
        if (songs.length === 0) return;
        currentIdx = (currentIdx + 1) % songs.length; 
        loadSong(currentIdx); 
        audio.play(); 
        document.getElementById('playB').innerText = "PAUSE"; 
                if (audioContext && audioContext.state === 'suspended') {
            audioContext.resume();
        }
    }
    
    function prev() { 
        if (songs.length === 0) return;
        currentIdx = (currentIdx - 1 + songs.length) % songs.length; 
        loadSong(currentIdx); 
        audio.play(); 
        document.getElementById('playB').innerText = "PAUSE"; 
        
        if (audioContext && audioContext.state === 'suspended') {
            audioContext.resume();
        }
    }
    
    function seek(e) { 
        if (!audio.duration) return;
        const rect = document.getElementById('p-box').getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        audio.currentTime = pos * audio.duration; 
    }

    audio.addEventListener('timeupdate', () => {
        if (!audio.duration) return;
        
        const ct = Math.floor(audio.currentTime);
        if (songs.length > 0 && songs[currentIdx]) {
            const l = songs[currentIdx].lyrics;
            if (l && l[ct]) {
                document.getElementById('lyrics-text').innerText = l[ct];
            }
            const progressPercent = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress').style.width = progressPercent + '%';
        }
    });

    audio.addEventListener('ended', next);
    
    audio.addEventListener('error', (e) => {
        console.error("Audio Error:", e);
        showToast('⚠️ Error loading audio');
    });

    // ========== MENU FUNCTIONS ==========

    function toggleMenu() {
        const panel = document.getElementById('menuPanel');
        const overlay = document.getElementById('menuOverlay');        panel.classList.toggle('active');
        overlay.classList.toggle('active');
    }

    function toggleTheme() {
        const root = document.documentElement;
        const currentBg = getComputedStyle(root).getPropertyValue('--bg').trim();
        if (currentBg === '#050505') {
            root.style.setProperty('--bg', '#1a1a2e');
            root.style.setProperty('--card', 'rgba(26, 26, 46, 0.95)');
            showToast('🌙 Midnight Theme Activated!');
        } else {
            root.style.setProperty('--bg', '#050505');
            root.style.setProperty('--card', 'rgba(15, 15, 15, 0.95)');
            showToast('🌑 Dark Theme Activated!');
        }
        toggleMenu();
    }

    function showAbout() {
        alert('✨ S 0 S MODS RGB Player ✨\n\n👨‍ Developer: ကိုမျိုး\n🎵 Powered by Appwrite\n🌈 RGB Animation Edition\n\nThank you for using! ❤️');
        toggleMenu();
    }

    function clearCache() {
        if (confirm('Clear cached songs data?')) {
            if ('caches' in window) {
                caches.keys().then(names => {
                    names.forEach(name => caches.delete(name));
                });
            }
            showToast('🗑️ Cache cleared!');
        }
        toggleMenu();
    }

    function toggleVisualizer() {
        visualizerEnabled = !visualizerEnabled;
        document.getElementById('vizStatus').innerText = visualizerEnabled ? 'ON' : 'OFF';
        showToast(visualizerEnabled ? '🌊 Visualizer Enabled!' : '🌊 Visualizer Disabled');
        
        if (!visualizerEnabled && ctx) {
            // Clear canvas when disabled
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        } else if (visualizerEnabled) {
            // Restart animation
            drawVisualizer();
        }
    }
    function changeSpeed(val) {
        audio.playbackRate = parseFloat(val);
        showToast('⚡ Speed: ' + val + 'x');
    }

    function showToast(message) {
        const existingToast = document.querySelector('.toast');
        if (existingToast) {
            existingToast.remove();
        }
        
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = message;
        document.body.appendChild(toast);
        
        setTimeout(() => toast.classList.add('show'), 10);
        
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 300);
        }, 2500);
    }

    // Handle window resize for canvas
    window.addEventListener('resize', () => {
        if (canvas) {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
    });

    // Initialize
    window.addEventListener('DOMContentLoaded', initPlayer);
</script>
</body>
</html>
