<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S 0 S MODS - RGB Visualizer Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Kavoon&family=Noto+Sans+Myanmar:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
    <style>
        :root { 
            --bg: #050505; 
            --card: rgba(15, 15, 15, 0.95); 
            --font-main: 'Kavoon', serif;
            --font-mm: 'Noto Sans Myanmar', sans-serif;
        }
        
        @keyframes rgb-text {
            0% { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
            33% { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
            66% { color: #0000ff; text-shadow: 0 0 10px #0000ff; }
            100% { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: var(--font-mm);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding: 15px; 
            background-image: radial-gradient(circle at center, #151515 0%, #000 100%);
            overflow-x: hidden;
        }

        .player-main-container {
            display: flex; 
            flex-direction: column; 
            align-items: center;
            width: 100%; 
            max-width: 330px; 
            height: calc(100vh - 30px);
            position: relative;        }

        .dev-tag {
            font-family: var(--font-main);
            font-size: 0.8rem; 
            letter-spacing: 2px; 
            margin-bottom: 10px;
            text-transform: uppercase;
            animation: rgb-text 3s linear infinite;
        }

        .player-card { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 25px; 
            width: 100%; 
            text-align: center; 
            position: relative;
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.9); 
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .lyrics-box { 
            height: 50px; 
            font-size: 0.9rem; 
            margin-bottom: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: rgba(0,0,0,0.5); 
            border-radius: 12px; 
            padding: 8px;
            animation: rgb-text 4s linear infinite;
            font-weight: bold;
        }

        .song-info h2 { 
            font-family: var(--font-main); 
            margin: 0; 
            font-size: 1.6rem; 
            animation: rgb-text 5s linear infinite;
        }

        .song-info p { 
            margin: 5px 0 25px 0; 
            font-size: 0.85rem; 
            letter-spacing: 1px;             font-weight: bold;
            animation: rgb-text 6s linear infinite;
        }

        /* VISUALIZER CANVAS */
        #visualizer-canvas {
            width: 100%;
            height: 60px;
            margin-bottom: 15px;
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
        }

        .progress-bar { 
            width: 100%; 
            height: 5px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 10px; 
            margin-bottom: 25px; 
            cursor: pointer; 
        }
        
        #progress { 
            width: 0%; 
            height: 100%; 
            background: linear-gradient(90deg, #f00, #0f0, #00f, #f0f);
            background-size: 300% 100%;
            animation: rgb-flow 2s linear infinite;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.5); 
            border-radius: 10px;
        }

        @keyframes rgb-flow { 
            0% { background-position: 0% 50%; } 
            100% { background-position: 100% 50%; } 
        }

        .controls { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            align-items: center; 
        }
        
        .btn { 
            background: transparent; 
            border: 2px solid transparent;
            background-image: linear-gradient(var(--card), var(--card)), linear-gradient(45deg, #f00, #0f0, #00f);
            background-origin: border-box; 
            background-clip: content-box, border-box;            color: #fff; 
            border-radius: 50%; 
            width: 50px; 
            height: 50px; 
            cursor: pointer; 
            transition: 0.3s;
            font-size: 1rem;
        }

        .play-btn { 
            width: 70px; 
            height: 70px; 
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .song-list-wrapper {
            width: 100%; 
            background: rgba(10, 10, 10, 0.7); 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            flex-grow: 1;
        }
        
        .song-list-header {
            font-family: var(--font-main); 
            font-size: 0.75rem;
            padding: 12px 15px; 
            border-bottom: 1px solid rgba(255,255,255,0.02);
            animation: rgb-text 8s linear infinite;
        }

        .song-list { 
            overflow-y: auto; 
            padding: 10px; 
        }
        
        .song-item { 
            padding: 12px; 
            cursor: pointer; 
            border-radius: 15px; 
            transition: 0.2s; 
            margin-bottom: 6px; 
            border: 1px solid transparent;
        }
        
        .song-item.active { 
            background: rgba(255, 255, 255, 0.03);            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .song-item.active .song-item-title { 
            animation: rgb-text 3s linear infinite; 
            font-weight: bold;
        }
        
        .song-item-title { 
            font-size: 0.9rem; 
            color: #888; 
        }

        .loading-text {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.9rem;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(45deg, #0ff, #0f0, #00f);
            color: #000;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            z-index: 3000;
            box-shadow: 0 5px 25px rgba(0,255,255,0.5);
            transition: transform 0.3s ease;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 360px) {
            .player-main-container { 
                max-width: 100%; 
            }
        }
    </style>
</head>
<body>

<div class="player-main-container">
    <div class="dev-tag">Developer: ကိုမျိုး</div>    
    <div class="player-card">
        <div class="lyrics-box" id="lyrics-text">S 0 S MODS RGB</div>
        
        <div class="song-info">
            <h2 id="title">Loading...</h2>
            <p id="artist">Please wait</p>
        </div>

        <!-- Audio Visualizer Canvas -->
        <canvas id="visualizer-canvas"></canvas>

        <div class="progress-bar" id="p-box" onclick="seek(event)">
            <div id="progress"></div>
        </div>

        <div class="controls">
            <button class="btn" onclick="prev()">⏮</button>
            <button class="btn play-btn" onclick="toggle()" id="playB">PLAY</button>
            <button class="btn" onclick="next()">⏭</button>
        </div>
    </div>

    <div class="song-list-wrapper">
        <div class="song-list-header">TRACKLIST</div>
        <div class="song-list" id="list-container">
            <div class="loading-text">Loading songs...</div>
        </div>
    </div>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
    const { Client, Databases } = Appwrite;
    const client = new Client().setEndpoint('https://sgp.cloud.appwrite.io/v1').setProject('69d4b1300032c235932d');
    const databases = new Databases(client);
    const audio = document.getElementById('audio');
    
    let songs = [];
    let currentIdx = 0;
    let visualizerEnabled = true;
    
    // Audio Context for Visualizer
    let audioContext;
    let analyser;
    let source;
    let canvas, ctx;
    let bufferLength;
    let dataArray;    let isAudioContextInitialized = false;

    // Demo Songs (Fallback if Appwrite fails)
    const demoSongs = [
        {
            title: "ဘယ်ဘာ့လဲ",
            artist: "ထွန်းအောင်",
            src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
            lyrics: { 0: "ဘယ်ဘာ့လဲ 🎵", 10: "သီချင်းစတင်ပါပြီ", 20: "နားထောင်ပါ..." }
        },
        {
            title: "တစ်ခါသားရင်ခုန်လို့ပါ",
            artist: "အဆိုတော်",
            src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
            lyrics: { 0: "တစ်ခါသားရင်ခုန်လို့ပါ 🎶" }
        },
        {
            title: "သကြင်္သမေရွင်း",
            artist: "အဆိုတော်",
            src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
            lyrics: { 0: "သကြင်္သမေရွင်း 🎤" }
        }
    ];

    async function initPlayer() {
        try {
            document.getElementById('title').innerText = "SYNCING...";
            document.getElementById('artist').innerText = "Connecting to server";
            
            const response = await databases.listDocuments('69d4b25f0004ed8a26a2', 'cloud');
            
            if (response.documents && response.documents.length > 0) {
                songs = response.documents.map(doc => {
                    let pL = {};
                    try { 
                        pL = JSON.parse(doc.lyrics.replace(/'/g, '"')); 
                    } catch(e) { 
                        pL = { 0: doc.lyrics || "..." }; 
                    }
                    return { 
                        title: doc.title, 
                        artist: doc.artist, 
                        src: doc.src, 
                        lyrics: pL 
                    };
                });
                showToast('✅ Loaded ' + songs.length + ' songs from server');
            } else {
                throw new Error("No songs found");
            }        } catch (error) { 
            console.error("Appwrite Error:", error);
            showToast('⚠️ Using Demo Songs');
            songs = demoSongs;
        }
        
        renderList();
        if (songs.length > 0) {
            loadSong(0);
        } else {
            document.getElementById('title').innerText = "NO SONGS";
            document.getElementById('artist').innerText = "Please add songs";
            document.getElementById('list-container').innerHTML = '<div class="loading-text">No songs available</div>';
        }
        
        initVisualizer();
    }

    function initVisualizer() {
        canvas = document.getElementById('visualizer-canvas');
        ctx = canvas.getContext('2d');
        
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        
        bufferLength = 128;
        dataArray = new Uint8Array(bufferLength);
        
        drawVisualizer();
    }

    function initAudioContext() {
        if (isAudioContextInitialized) return;
        
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            source = audioContext.createMediaElementSource(audio);
            
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            
            analyser.fftSize = 256;
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            
            isAudioContextInitialized = true;
            console.log("Audio Context Initialized");
        } catch (e) {
            console.error("Audio Context Error:", e);        }
    }

    function drawVisualizer() {
        if (!visualizerEnabled || !ctx || !canvas) return;
        
        requestAnimationFrame(drawVisualizer);
        
        if (!analyser) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const barWidth = (canvas.width / bufferLength) * 2.5;
            let x = 0;
            
            for(let i = 0; i < bufferLength; i++) {
                const barHeight = Math.random() * canvas.height * 0.5;
                
                const gradient = ctx.createLinearGradient(0, canvas.height, 0, canvas.height - barHeight);
                gradient.addColorStop(0, '#ff0000');
                gradient.addColorStop(0.5, '#00ff00');
                gradient.addColorStop(1, '#0000ff');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                
                x += barWidth + 1;
            }
            return;
        }
        
        analyser.getByteFrequencyData(dataArray);
        
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        const barWidth = (canvas.width / bufferLength) * 2.5;
        let x = 0;
        
        for(let i = 0; i < bufferLength; i++) {
            const barHeight = (dataArray[i] / 255) * canvas.height;
            
            const hue = (i / bufferLength) * 360;
            ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
            
            ctx.shadowBlur = 10;
            ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
            
            ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                        ctx.shadowBlur = 0;
            
            x += barWidth + 1;
        }
    }

    function renderList() {
        const container = document.getElementById('list-container');
        if (songs.length === 0) {
            container.innerHTML = '<div class="loading-text">No songs found</div>';
            return;
        }
        
        container.innerHTML = songs.map((s, i) => `
            <div class="song-item ${i === currentIdx ? 'active' : ''}" onclick="selectSong(${i})">
                <span class="song-item-title">${i + 1}. ${s.title}</span>
            </div>
        `).join('');
    }

    function loadSong(index) {
        if (index < 0 || index >= songs.length) return;
        
        currentIdx = index;
        audio.src = songs[currentIdx].src;
        document.getElementById('title').innerText = songs[currentIdx].title;
        document.getElementById('artist').innerText = songs[currentIdx].artist;
        document.getElementById('lyrics-text').innerText = "Ready to play";
        renderList();
        
        if (!isAudioContextInitialized) {
            initAudioContext();
        }
    }

    function selectSong(i) { 
        loadSong(i); 
        audio.play(); 
        document.getElementById('playB').innerText = "PAUSE"; 
        
        if (audioContext && audioContext.state === 'suspended') {
            audioContext.resume();
        }
    }
    
    function toggle() {
        if (audio.paused) { 
            if (!audio.src) {
                showToast('⚠️ No song loaded');
                return;            }
            
            if (!isAudioContextInitialized) {
                initAudioContext();
            }
            
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
            
            audio.play(); 
            document.getElementById('playB').innerText = "PAUSE"; 
        } else { 
            audio.pause(); 
            document.getElementById('playB').innerText = "PLAY"; 
        }
    }
    
    function next() { 
        if (songs.length === 0) return;
        currentIdx = (currentIdx + 1) % songs.length; 
        loadSong(currentIdx); 
        audio.play(); 
        document.getElementById('playB').innerText = "PAUSE"; 
        
        if (audioContext && audioContext.state === 'suspended') {
            audioContext.resume();
        }
    }
    
    function prev() { 
        if (songs.length === 0) return;
        currentIdx = (currentIdx - 1 + songs.length) % songs.length; 
        loadSong(currentIdx); 
        audio.play(); 
        document.getElementById('playB').innerText = "PAUSE"; 
        
        if (audioContext && audioContext.state === 'suspended') {
            audioContext.resume();
        }
    }
    
    function seek(e) { 
        if (!audio.duration) return;
        const rect = document.getElementById('p-box').getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        audio.currentTime = pos * audio.duration; 
    }

    audio.addEventListener('timeupdate', () => {        if (!audio.duration) return;
        
        const ct = Math.floor(audio.currentTime);
        if (songs.length > 0 && songs[currentIdx]) {
            const l = songs[currentIdx].lyrics;
            if (l && l[ct]) {
                document.getElementById('lyrics-text').innerText = l[ct];
            }
            const progressPercent = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress').style.width = progressPercent + '%';
        }
    });

    audio.addEventListener('ended', next);
    
    audio.addEventListener('error', (e) => {
        console.error("Audio Error:", e);
        showToast('⚠️ Error loading audio');
    });

    function showToast(message) {
        const existingToast = document.querySelector('.toast');
        if (existingToast) {
            existingToast.remove();
        }
        
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = message;
        document.body.appendChild(toast);
        
        setTimeout(() => toast.classList.add('show'), 10);
        
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 300);
        }, 2500);
    }

    window.addEventListener('resize', () => {
        if (canvas) {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
    });

    window.addEventListener('DOMContentLoaded', initPlayer);
</script>
</body>
</html>
