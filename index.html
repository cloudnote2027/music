<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S 0 S MODS - RGB Beat Visualizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Kavoon&family=Noto+Sans+Myanmar:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
    <style>
        :root { 
            --bg: #050505; 
            --card: rgba(15, 15, 15, 0.95); 
            --font-main: 'Kavoon', serif;
            --font-mm: 'Noto Sans Myanmar', sans-serif;
        }
        
        @keyframes rgb-text {
            0% { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
            33% { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
            66% { color: #0000ff; text-shadow: 0 0 10px #0000ff; }
            100% { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background: var(--bg); color: white; font-family: var(--font-mm);
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; padding: 10px; /* Padding လျှော့ချ */
            background-image: radial-gradient(circle at center, #151515 0%, #000 100%);
            overflow-x: hidden;
        }

        .player-main-container {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; 
            max-width: 300px; /* အကျယ်ကို လျှော့ချ (၃၃၀ -> ၃၀၀) */
            height: calc(100vh - 20px);
            position: relative;
        }

        /* DEVELOPER စာသား သေးခြင်း */
        .dev-tag { font-family: var(--font-main); font-size: 0.7rem; letter-spacing: 1px; margin-bottom: 8px; text-transform: uppercase; animation: rgb-text 3s linear infinite; }

        .player-card { 
            background: var(--card); 
            padding: 15px; /* Padding လျှော့ချ (၂၅ -> ၁၅) */
            border-radius: 20px; /* ခြင်းရာ radius လျှော့ချ */
            width: 100%; text-align: center; 
            position: relative; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.9); 
            margin-bottom: 15px; /* Margin လျှော့ချ */
            flex-shrink: 0;
            transition: box-shadow 0.1s ease, border-color 0.1s ease;
        }

        /* စာသား box သေးခြင်း */
        .lyrics-box { 
            height: 40px; /* အမြင့် လျှော့ချ (၅၀ -> ၄၀) */
            font-size: 0.8rem; /* Font သေးခြင်း (၀.၉ -> ၀.၈) */
            margin-bottom: 10px; 
            display: flex; align-items: center; justify-content: center; 
            background: rgba(0,0,0,0.5); border-radius: 10px; padding: 5px; 
            animation: rgb-text 4s linear infinite; font-weight: bold;
        }

        /* သီချင်းခေါင်းစဉ် သေးခြင်း */
        .song-info h2 { font-family: var(--font-main); margin: 0; font-size: 1.3rem; animation: rgb-text 5s linear infinite; }
        /* အဆိုတော်နာမည် သေးခြင်း */
        .song-info p { margin: 3px 0 15px 0; font-size: 0.75rem; letter-spacing: 1px; font-weight: bold; animation: rgb-text 6s linear infinite; }

        /* Visualizer သေးခြင်း */
        #visualizer-canvas { width: 100%; height: 50px; margin-bottom: 10px; border-radius: 8px; background: rgba(0,0,0,0.3); }

        .progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 15px; cursor: pointer; }
        #progress { 
            width: 0%; height: 100%; background: linear-gradient(90deg, #f00, #0f0, #00f, #f0f);
            background-size: 300% 100%; animation: rgb-flow 2s linear infinite;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.5); border-radius: 8px;
        }

        @keyframes rgb-flow { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

        .controls { display: flex; justify-content: center; gap: 10px; align-items: center; }
        /* Control ခလုတ်များ သေးခြင်း */
        .btn { background: transparent; border: 2px solid transparent; background-image: linear-gradient(var(--card), var(--card)), linear-gradient(45deg, #f00, #0f0, #00f); background-origin: border-box; background-clip: content-box, border-box; color: #fff; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; transition: 0.3s; font-size: 0.8rem; }
        /* Play ခလုတ် သေးခြင်း */
        .play-btn { width: 55px; height: 55px; box-shadow: 0 0 15px rgba(255,255,255,0.1); font-size: 0.7rem; }

        .song-list-wrapper { width: 100%; background: rgba(10, 10, 10, 0.7); border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.03); display: flex; flex-direction: column; overflow: hidden; flex-grow: 1; }
        .song-list-header { font-family: var(--font-main); font-size: 0.65rem; padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.02); animation: rgb-text 8s linear infinite; }

        .song-list { overflow-y: auto; padding: 8px; scroll-behavior: smooth; }
        /* Item မြင့် လျှော့ချ */
        .song-item { padding: 8px; cursor: pointer; border-radius: 10px; transition: 0.2s; margin-bottom: 4px; border: 1px solid transparent; }
        .song-item.active { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); }
        .song-item.active .song-item-title { animation: rgb-text 3s linear infinite; font-weight: bold; }
        /* Item font သေးခြင်း */
        .song-item-title { font-size: 0.8rem; color: #888; }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: linear-gradient(45deg, #0ff, #0f0, #00f); color: #000; padding: 10px 20px; border-radius: 20px; font-weight: bold; z-index: 3000; transition: transform 0.3s ease; font-size: 0.8rem; }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="player-main-container">
    <div class="dev-tag">Developer: ကိုမျိုး</div>    
    <div class="player-card" id="player-card">
        <div class="lyrics-box" id="lyrics-text">S 0 S MODS RGB</div>
        <div class="song-info">
            <h2 id="title">Loading...</h2>
            <p id="artist">Please wait</p>
        </div>
        <canvas id="visualizer-canvas"></canvas>
        <div class="progress-bar" id="p-box" onclick="seek(event)">
            <div id="progress"></div>
        </div>
        <div class="controls">
            <button class="btn" onclick="prev()">⏮</button>
            <button class="btn play-btn" onclick="toggle()" id="playB">PLAY</button>
            <button class="btn" onclick="next()">⏭</button>
        </div>
    </div>
    <div class="song-list-wrapper">
        <div class="song-list-header">TRACKLIST</div>
        <div class="song-list" id="list-container">
            <div style="text-align:center; padding:15px; color:#666; font-size: 0.8rem;">Connecting...</div>
        </div>
    </div>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
    const { Client, Databases, Query } = Appwrite;
    const client = new Client().setEndpoint('https://sgp.cloud.appwrite.io/v1').setProject('69d4b1300032c235932d');
    const databases = new Databases(client);
    const audio = document.getElementById('audio');
    const playerCard = document.getElementById('player-card');
    
    let songs = [];
    let currentIdx = 0;
    let audioContext, analyser, source, canvas, ctx, dataArray;
    let isAudioContextInitialized = false;

    async function initPlayer() {
        try {
            const response = await databases.listDocuments(
                '69d4b25f0004ed8a26a2', 
                'cloud',
                [Query.limit(500), Query.orderDesc("$createdAt")]
            );
            
            if (response.documents && response.documents.length > 0) {
                songs = response.documents.map(doc => {
                    let pL = {};
                    try { pL = JSON.parse(doc.lyrics.replace(/'/g, '"')); } 
                    catch(e) { pL = { 0: doc.lyrics || "..." }; }
                    return { title: doc.title, artist: doc.artist, src: doc.src, lyrics: pL };
                });
                
                localStorage.setItem('cachedSongs', JSON.stringify(songs));
                showToast('✅ Sync Completed: ' + songs.length + ' songs');
            }
        } catch (error) { 
            console.error("Appwrite Error:", error);
            const localData = localStorage.getItem('cachedSongs');
            if (localData) {
                songs = JSON.parse(localData);
                showToast('📡 Offline Mode: Loaded from Cache');
            } else {
                showToast('⚠️ No Connection');
            }
        }
        
        renderList();
        if (songs.length > 0) loadSong(0, false);
        initVisualizer();
    }

    function initVisualizer() {
        canvas = document.getElementById('visualizer-canvas');
        ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        drawVisualizer();
    }

    function initAudioContext() {
        if (isAudioContextInitialized) return;
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            source = audioContext.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            isAudioContextInitialized = true;
        } catch (e) { console.log("AudioContext blocked"); }
    }

    function drawVisualizer() {
        requestAnimationFrame(drawVisualizer);
        if (!ctx) return;
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        if (analyser) {
            analyser.getByteFrequencyData(dataArray);
            
            let sum = 0;
            for(let i = 0; i < dataArray.length; i++) { sum += dataArray[i]; }
            let average = sum / dataArray.length;
            
            // Glow intensity သေးခြင်း
            playerCard.style.boxShadow = `0 0 ${average / 3}px rgba(0, 255, 204, 0.3)`;
            playerCard.style.borderColor = `rgba(0, 255, 204, ${average / 300})`;
            
            const barWidth = (canvas.width / dataArray.length) * 2.5;
            let x = 0;
            for(let i = 0; i < dataArray.length; i++) {
                const barHeight = (dataArray[i] / 255) * canvas.height;
                ctx.fillStyle = `hsl(${(i / dataArray.length) * 360}, 100%, 50%)`;
                ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                x += barWidth + 1;
            }
        }
    }

    function renderList() {
        const container = document.getElementById('list-container');
        if (songs.length === 0) return;
        container.innerHTML = songs.map((s, i) => `
            <div class="song-item ${i === currentIdx ? 'active' : ''}" id="item-${i}" onclick="selectSong(${i})">
                <span class="song-item-title">${i + 1}. ${s.title}</span>
            </div>
        `).join('');
    }

    function loadSong(index, play = true) {
        currentIdx = index;
        audio.src = songs[currentIdx].src;
        document.getElementById('title').innerText = songs[currentIdx].title;
        document.getElementById('artist').innerText = songs[currentIdx].artist;
        document.getElementById('lyrics-text').innerText = "S 0 S MODS RGB";
        renderList();

        const activeItem = document.getElementById(`item-${index}`);
        if (activeItem) activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        if (play) {
            initAudioContext();
            if (audioContext && audioContext.state === 'suspended') audioContext.resume();
            audio.play();
            document.getElementById('playB').innerText = "PAUSE";
        }
    }

    function selectSong(i) { loadSong(i, true); }
    
    function toggle() {
        initAudioContext();
        if (audioContext && audioContext.state === 'suspended') audioContext.resume();
        if (audio.paused) { audio.play(); document.getElementById('playB').innerText = "PAUSE"; }
        else { audio.pause(); document.getElementById('playB').innerText = "PLAY"; }
    }
    
    function next() { currentIdx = (currentIdx + 1) % songs.length; loadSong(currentIdx, true); }
    function prev() { currentIdx = (currentIdx - 1 + songs.length) % songs.length; loadSong(currentIdx, true); }
    
    function seek(e) { 
        const rect = document.getElementById('p-box').getBoundingClientRect();
        audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration; 
    }

    audio.addEventListener('timeupdate', () => {
        if (!audio.duration) return;
        const ct = Math.floor(audio.currentTime);
        const l = songs[currentIdx].lyrics;
        const times = Object.keys(l).map(Number).sort((a,b) => a - b);
        let currentL = document.getElementById('lyrics-text').innerText;
        for (let t of times) { if (ct >= t) currentL = l[t]; }
        document.getElementById('lyrics-text').innerText = currentL;
        document.getElementById('progress').style.width = (audio.currentTime / audio.duration) * 100 + '%';
    });

    audio.addEventListener('ended', next);
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    window.addEventListener('resize', () => {
        if (canvas) { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
    });

    window.onload = initPlayer;
</script>
</body>
</html>
